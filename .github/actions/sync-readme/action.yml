name: 'Sync README with Source Files'
description: 'Checks or updates README.md collapsible sections with content from .env.example and docker-compose.yml'
inputs:
  fail-on-diff:
    description: 'Whether to fail if README is out of sync (useful for PRs)'
    required: false
    default: 'false'
outputs:
  changed:
    description: 'Whether the README was changed'
    value: ${{ steps.sync.outputs.changed }}

runs:
  using: 'composite'
  steps:
    - name: Sync README sections
      id: sync
      shell: bash
      run: |
        if [[ "${{ inputs.fail-on-diff }}" == "true" ]]; then
          bash tests/check_readme_sync.sh --check
        else
          bash tests/check_readme_sync.sh --write
        fi
