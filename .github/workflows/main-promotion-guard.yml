name: Main Promotion Guard

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  guard:
    name: Main Promotion Guard
    runs-on: self-hosted

    steps:
      - name: Require beta as source branch for main
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual guard run completed."
            exit 0
          fi

          HEAD_BRANCH="${{ github.event.pull_request.head.ref }}"
          HEAD_REPO="${{ github.event.pull_request.head.repo.full_name }}"
          BASE_BRANCH="${{ github.event.pull_request.base.ref }}"

          if [ "$BASE_BRANCH" = "main" ] && { [ "$HEAD_BRANCH" != "beta" ] || [ "$HEAD_REPO" != "${{ github.repository }}" ]; }; then
            echo "Pull requests into main must be promoted from the repository beta branch."
            echo "Open feature work against beta, quality-test it there, then promote beta to main."
            exit 1
          fi

          echo "Main promotion source branch is valid."