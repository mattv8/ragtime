name: Build and Push Container

on:
  push:
    branches:
      - '**'
    paths:
      # Docker build files
      - 'docker/**'
      - 'docker-compose.yml'
      - '.dockerignore'
      # Application code
      - 'ragtime/**'
      - 'runtime/**'
      - 'tests/**'
      # Dependencies and build config
      - 'pyproject.toml'
      # Database schema (requires container rebuild for migrations)
      - 'prisma/**'
      # CI workflow itself
      - '.github/workflows/build-container.yml'
      - '.github/actions/**'
  workflow_dispatch:

env:
  REGISTRY: hub.docker.visnovsky.us
  IMAGE_NAME: library/ragtime
  IMAGE_RUNTIME_NAME: library/runtime

jobs:
  test:
    name: Run Tests
    runs-on: self-hosted
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate docker compose manifests
        run: |
          cp -n .env.example .env
          docker compose -f docker-compose.yml config >/dev/null
          docker compose -f docker/docker-compose.dev.yml config >/dev/null

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract branch name
        id: extract_branch
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          SAFE_BRANCH=$(echo "$BRANCH_NAME" | sed 's/\//-/g')
          echo "branch=$SAFE_BRANCH" >> $GITHUB_OUTPUT

      - name: Log in to Harbor Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Run pytest in Docker test stage
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          target: python-test
          push: false
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ steps.extract_branch.outputs.branch }}
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-main
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
            type=gha,scope=ragtime-${{ steps.extract_branch.outputs.branch }}
            type=gha,scope=ragtime-main
            type=gha
          cache-to: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ steps.extract_branch.outputs.branch }},mode=max,oci-mediatypes=true,image-manifest=true,compression=zstd
            type=gha,mode=max,scope=ragtime-${{ steps.extract_branch.outputs.branch }}

  build-main:
    name: Build Main Image
    runs-on: self-hosted
    needs: [test]
    permissions:
      contents: read
      packages: write
    outputs:
      branch: ${{ steps.extract_branch.outputs.branch }}
      tags: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build-main.outputs.digest }}
      image-name: ${{ steps.meta.outputs.image-name }}
      short-sha: ${{ steps.meta.outputs.short-sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract branch name
        id: extract_branch
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          # Replace / with - for valid docker tags
          SAFE_BRANCH=$(echo "$BRANCH_NAME" | sed 's/\//-/g')
          echo "branch=$SAFE_BRANCH" >> $GITHUB_OUTPUT
          echo "Building for branch: $SAFE_BRANCH"

      - name: Determine Docker tags
        id: meta
        run: |
          BRANCH="${{ steps.extract_branch.outputs.branch }}"
          SHORT_SHA="${GITHUB_SHA::7}"

          # Default tags: branch name and 7-char commit SHA
          TAGS="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${BRANCH}"
          TAGS="${TAGS},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}"

          # If this is the main branch, also tag as 'latest'
          if [ "$BRANCH" = "main" ]; then
            TAGS="${TAGS},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          fi

          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          echo "short-sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "image-name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${BRANCH}" >> $GITHUB_OUTPUT
          echo "Tags to be pushed: ${TAGS}"

      - name: Log in to Harbor Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push Docker image
        id: build-main
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ steps.extract_branch.outputs.branch }}
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-main
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
            type=gha,scope=ragtime-${{ steps.extract_branch.outputs.branch }}
            type=gha,scope=ragtime-main
            type=gha
          cache-to: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ steps.extract_branch.outputs.branch }},mode=max,oci-mediatypes=true,image-manifest=true,compression=zstd
            type=gha,mode=max,scope=ragtime-${{ steps.extract_branch.outputs.branch }}

      - name: Cleanup old Docker images
        uses: ./.github/actions/cleanup
        with:
          repositories: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Match all tags, but exclude 'latest', 'legacy', and 'buildcache' from deletion
          tagPattern: '.'
          excludePattern: ':latest$|:legacy$|-legacy$|:buildcache($|-.*$)'
          keep: '3'

  build-runtime:
    name: Build Runtime Image
    runs-on: self-hosted
    needs: [test]
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build-runtime.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract branch name
        id: extract_branch
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          SAFE_BRANCH=$(echo "$BRANCH_NAME" | sed 's/\//-/g')
          echo "branch=$SAFE_BRANCH" >> $GITHUB_OUTPUT

      - name: Determine Runtime Docker tags
        id: meta
        run: |
          BRANCH="${{ steps.extract_branch.outputs.branch }}"
          SHORT_SHA="${GITHUB_SHA::7}"

          TAGS="${{ env.REGISTRY }}/${{ env.IMAGE_RUNTIME_NAME }}:${BRANCH}"
          TAGS="${TAGS},${{ env.REGISTRY }}/${{ env.IMAGE_RUNTIME_NAME }}:${SHORT_SHA}"

          if [ "$BRANCH" = "main" ]; then
            TAGS="${TAGS},${{ env.REGISTRY }}/${{ env.IMAGE_RUNTIME_NAME }}:latest"
          fi

          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          echo "image-name=${{ env.REGISTRY }}/${{ env.IMAGE_RUNTIME_NAME }}:${BRANCH}" >> $GITHUB_OUTPUT

      - name: Log in to Harbor Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push runtime Docker image
        id: build-runtime
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_RUNTIME_NAME }}:buildcache-${{ steps.extract_branch.outputs.branch }}
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_RUNTIME_NAME }}:buildcache-main
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_RUNTIME_NAME }}:buildcache
            type=gha,scope=runtime-${{ steps.extract_branch.outputs.branch }}
            type=gha,scope=runtime-main
            type=gha
          cache-to: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_RUNTIME_NAME }}:buildcache-${{ steps.extract_branch.outputs.branch }},mode=max,oci-mediatypes=true,image-manifest=true,compression=zstd
            type=gha,mode=max,scope=runtime-${{ steps.extract_branch.outputs.branch }}

      - name: Cleanup old runtime Docker images
        uses: ./.github/actions/cleanup
        with:
          repositories: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_RUNTIME_NAME }}
          tagPattern: '.'
          excludePattern: ':latest$|:buildcache($|-.*$)'
          keep: '3'

  # Build legacy image for older CPUs without X86_V2 support
  build-legacy:
    name: Build Legacy Image
    runs-on: self-hosted
    needs: [test]
    # Only build legacy on main branch
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build-legacy.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Harbor Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push legacy Docker image
        id: build-legacy
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:legacy
          build-args: |
            LEGACY_CPU=1
          # Don't use cache for legacy build to ensure clean numpy compilation
          no-cache: true

  sign:
    name: Sign Container Images
    runs-on: self-hosted
    needs: [build-main, build-runtime]
    if: always() && needs.build-main.result == 'success' && needs.build-runtime.result == 'success'
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Log in to Harbor Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Sign the main container image with Cosign
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
        run: |
          # Construct the full image reference from build outputs
          IMAGE_DIGEST="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-main.outputs.digest }}"

          echo "Signing image: ${IMAGE_DIGEST}"

          # Sign using the full digest reference (registry/repo@sha256:...)
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY "${IMAGE_DIGEST}"

      - name: Sign the runtime image with Cosign
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
        run: |
          IMAGE_DIGEST="${{ env.REGISTRY }}/${{ env.IMAGE_RUNTIME_NAME }}@${{ needs.build-runtime.outputs.digest }}"
          echo "Signing runtime image: ${IMAGE_DIGEST}"
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY "${IMAGE_DIGEST}"

  sign-legacy:
    name: Sign Legacy Container Image
    runs-on: self-hosted
    needs: [build-legacy]
    if: always() && needs.build-legacy.result == 'success'
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Log in to Harbor Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Sign the legacy container image with Cosign
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
        run: |
          IMAGE_DIGEST="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-legacy.outputs.digest }}"
          echo "Signing legacy image: ${IMAGE_DIGEST}"
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY "${IMAGE_DIGEST}"

  sbom:
    name: Generate SBOM
    runs-on: self-hosted
    needs: [build-main, build-runtime]
    permissions:
      contents: read

    steps:
      - name: Log in to Harbor Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ needs.build-main.outputs.image-name }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ needs.build-main.outputs.branch }}
          path: sbom.spdx.json
          retention-days: 90

  sync-readme:
    name: Sync README
    runs-on: self-hosted
    needs: [build-main, build-runtime]
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update docker-compose.yml with branch tag
        run: |
          BRANCH="${{ needs.build-main.outputs.branch }}"
          echo "Updating docker-compose.yml image tags to: ${BRANCH}"
          sed -i "/^[[:space:]]*#/!s|^\([[:space:]]*\)image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:.*|\1image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${BRANCH}|" docker-compose.yml
          sed -i "/^[[:space:]]*#/!s|^\([[:space:]]*\)image: ${{ env.REGISTRY }}/${{ env.IMAGE_RUNTIME_NAME }}:.*|\1image: ${{ env.REGISTRY }}/${{ env.IMAGE_RUNTIME_NAME }}:${BRANCH}|" docker-compose.yml
          echo "Updated docker-compose.yml:"
          grep "image:" docker-compose.yml

      - name: Sync README with source files
        id: sync
        uses: ./.github/actions/sync-readme
        with:
          fail-on-diff: 'false'

      - name: Commit and push changes
        if: steps.sync.outputs.changed == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md docker-compose.yml
          git commit -m "docs: auto-update README and docker-compose.yml for branch ${{ needs.build-main.outputs.branch }}"
          git push

  summary:
    name: Build Summary
    runs-on: self-hosted
    needs: [build-main, build-runtime, sign, sbom, sync-readme]
    if: always()
    permissions:
      contents: read

    steps:
      - name: Generate Summary
        run: |
          # Check job statuses
          BUILD_PUSH_STATUS="${{ needs.build-main.result }}"
          SIGN_STATUS="${{ needs.sign.result }}"
          SBOM_STATUS="${{ needs.sbom.result }}"
          RUNTIME_STATUS="${{ needs.build-runtime.result }}"
          SYNC_STATUS="${{ needs.sync-readme.result }}"

          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ needs.build-main.outputs.branch }}" >> $GITHUB_STEP_SUMMARY
          echo "**Short SHA:** ${{ needs.build-main.outputs.short-sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$BUILD_PUSH_STATUS" = "success" ]; then
            echo "### Pull Command" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
            echo "docker pull ${{ needs.build-main.outputs.image-name }}" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "$RUNTIME_STATUS" = "success" ]; then
            echo "### Runtime Pull Command" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
            echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_RUNTIME_NAME }}:${{ needs.build-main.outputs.branch }}" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          echo "**Digest:** \`${{ needs.build-main.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$SIGN_STATUS" = "success" ]; then
            echo "**Signed:** Yes (Cosign)" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Signed:** Failed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$SBOM_STATUS" = "success" ]; then
            echo "**SBOM:** Generated" >> $GITHUB_STEP_SUMMARY
          else
            echo "**SBOM:** Failed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$SYNC_STATUS" = "success" ]; then
            echo "**README Sync:** Completed" >> $GITHUB_STEP_SUMMARY
          else
            echo "**README Sync:** Failed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            echo "**Legacy Image:** Building asynchronously in separate jobs (build-legacy -> sign-legacy)" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Legacy Image:** Skipped (main branch only)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$RUNTIME_STATUS" = "success" ]; then
            echo "**Runtime Image:** Built" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Runtime Image:** Failed" >> $GITHUB_STEP_SUMMARY
          fi
