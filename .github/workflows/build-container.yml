name: Build and Push Container

on:
  pull_request:
    branches:
      - main
      - beta
    paths: &container_paths
      # Docker build files
      - 'docker/**'
      - 'docker-compose.yml'
      - '.dockerignore'
      - '.jscpd.json'
      # Application code
      - 'ragtime/**'
      - 'runtime/**'
      - 'tests/**'
      # Dependencies and build config
      - 'pyproject.toml'
      - '.env.example'
      - 'README.md'
      - 'tests/check_readme_sync.sh'
      # Database schema (requires container rebuild for migrations)
      - 'prisma/**'
      # CI workflow itself
      - '.github/workflows/build-container.yml'
      - '.github/actions/**'
  push:
    branches:
      - main
      - beta
    paths: *container_paths
  workflow_dispatch:
    inputs:
      build_legacy_image:
        description: 'Build and sign the legacy CPU image'
        required: false
        type: boolean
        default: false

env:
  REGISTRY: hub.docker.visnovsky.us
  IMAGE_NAME: library/ragtime
  IMAGE_RUNTIME_NAME: library/runtime

jobs:
  test:
    name: Run Backend Quality and Tests
    runs-on: self-hosted
    permissions:
      contents: read
      pull-requests: read
    outputs:
      build_images: ${{ steps.image_coverage.outputs.build_images }}
      image_coverage_reason: ${{ steps.image_coverage.outputs.reason }}

    steps:
      - name: Decide backend quality coverage
        id: quality_coverage
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run_backend_quality=true" >> "$GITHUB_OUTPUT"
            echo "reason=Running backend quality for a manual container build." >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "run_backend_quality=false" >> "$GITHUB_OUTPUT"
            echo "reason=Skipping the aggregate Docker python-test target because the required CI workflow runs backend quality checks for this PR update." >> "$GITHUB_OUTPUT"
          else
            echo "run_backend_quality=false" >> "$GITHUB_OUTPUT"
            echo "reason=Skipping the aggregate Docker python-test target because main/beta pushes are expected to come from PRs whose required CI already passed." >> "$GITHUB_OUTPUT"
          fi

      - name: Decide image build coverage
        id: image_coverage
        uses: actions/github-script@v7
        with:
          script: |
            let buildImages = true;
            let reason = 'Building container images for this workflow event.';

            if (context.eventName === 'push') {
              try {
                const { owner, repo } = context.repo;
                const { data: pullRequests } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                  owner,
                  repo,
                  commit_sha: context.sha,
                  per_page: 20,
                });

                const openPullRequest = pullRequests.find((pullRequest) => (
                  pullRequest.state === 'open' && ['main', 'beta'].includes(pullRequest.base.ref)
                ));

                if (openPullRequest) {
                  buildImages = false;
                  reason = `Skipping branch image build because this push updates open PR #${openPullRequest.number}; the pull_request run will publish PR-tagged images.`;
                } else {
                  reason = 'Building branch images because this push is not covered by an open PR image build.';
                }
              } catch (error) {
                reason = `Building branch images because open PR coverage could not be verified: ${error.message}`;
                core.warning(reason);
              }
            } else if (context.eventName === 'pull_request') {
              reason = `Building PR-tagged images for PR #${context.payload.pull_request.number}.`;
            } else if (context.eventName === 'workflow_dispatch') {
              reason = 'Building images for a manual container workflow run.';
            }

            core.setOutput('build_images', String(buildImages));
            core.setOutput('reason', reason);
            core.notice(reason);

      - name: Checkout code
        if: steps.quality_coverage.outputs.run_backend_quality == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check README with source files
        if: steps.quality_coverage.outputs.run_backend_quality == 'true'
        uses: ./.github/actions/sync-readme
        with:
          fail-on-diff: 'true'

      - name: Validate docker compose manifests
        if: steps.quality_coverage.outputs.run_backend_quality == 'true'
        run: |
          cp -n .env.example .env
          docker compose -f docker-compose.yml config >/dev/null
          docker compose -f docker/docker-compose.dev.yml config >/dev/null

      - name: Set up Docker Buildx
        if: steps.quality_coverage.outputs.run_backend_quality == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Extract branch name
        if: steps.quality_coverage.outputs.run_backend_quality == 'true'
        id: extract_branch
        run: |
          REF_NAME="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          SAFE_BRANCH=$(echo "$REF_NAME" | sed 's/[\/:@]/-/g')
          echo "branch=$SAFE_BRANCH" >> $GITHUB_OUTPUT

      - name: Log in to Harbor Registry
        if: steps.quality_coverage.outputs.run_backend_quality == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Run pytest in Docker test stage
        if: steps.quality_coverage.outputs.run_backend_quality == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          target: python-test
          push: false
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ steps.extract_branch.outputs.branch }}
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-main
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
            type=gha,scope=ragtime-${{ steps.extract_branch.outputs.branch }}
            type=gha,scope=ragtime-main
            type=gha
          cache-to: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ steps.extract_branch.outputs.branch }},mode=max,oci-mediatypes=true,image-manifest=true,compression=zstd
            type=gha,mode=max,scope=ragtime-${{ steps.extract_branch.outputs.branch }}

      - name: Summarize backend quality coverage
        if: always()
        run: |
          {
            echo "### Backend Quality Coverage"
            echo
            echo "${{ steps.quality_coverage.outputs.reason }}"
            echo
            if [ "${{ steps.quality_coverage.outputs.run_backend_quality }}" = "true" ]; then
              echo "The aggregate Docker \`python-test\` target ran in this workflow."
            else
              echo "The aggregate Docker \`python-test\` target was skipped to avoid repeating the required CI backend gate."
            fi
            echo
            echo "${{ steps.image_coverage.outputs.reason }}"
          } >> "$GITHUB_STEP_SUMMARY"

  build-main:
    name: Build Application Image
    runs-on: self-hosted
    needs: [test]
    if: >-
      needs.test.outputs.build_images == 'true' &&
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository
      ) ||
      (
        (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/beta') &&
        !(github.event_name == 'workflow_dispatch' && github.event.inputs.build_legacy_image == 'true')
      )
    permissions:
      contents: read
      packages: write
    outputs:
      branch: ${{ steps.extract_branch.outputs.branch }}
      tags: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build-main.outputs.digest }}
      image-name: ${{ steps.meta.outputs.image-name }}
      short-sha: ${{ steps.meta.outputs.short-sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract branch name
        id: extract_branch
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            SAFE_BRANCH="pr-${{ github.event.pull_request.number }}"
          else
            REF_NAME="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
            SAFE_BRANCH=$(echo "$REF_NAME" | sed 's/[\/:@]/-/g')
          fi
          echo "branch=$SAFE_BRANCH" >> $GITHUB_OUTPUT
          echo "Building for branch: $SAFE_BRANCH"

      - name: Determine Docker tags
        id: meta
        run: |
          BRANCH="${{ steps.extract_branch.outputs.branch }}"
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

          TAGS="${IMAGE}:${BRANCH}"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TAGS="${TAGS},${IMAGE}:${BRANCH}-${SHORT_SHA}"
          else
            TAGS="${TAGS},${IMAGE}:${SHORT_SHA}"
          fi

          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            TAGS="${TAGS},${IMAGE}:latest"
          fi

          if [ "${GITHUB_REF}" = "refs/heads/beta" ]; then
            TAGS="${TAGS},${IMAGE}:latest-beta"
          fi

          APP_VERSION="${SHORT_SHA}"

          ENVIRONMENT="main"
          if [ "${GITHUB_REF}" = "refs/heads/beta" ]; then
            ENVIRONMENT="beta"
          fi

          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          echo "short-sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "image-name=${IMAGE}:${BRANCH}" >> $GITHUB_OUTPUT
          echo "app-version=${APP_VERSION}" >> $GITHUB_OUTPUT
          echo "environment=${ENVIRONMENT}" >> $GITHUB_OUTPUT
          echo "Tags to be pushed: ${TAGS}"

      - name: Log in to Harbor Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push Docker image
        id: build-main
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.app-version }}
            ENVIRONMENT=${{ steps.meta.outputs.environment }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ steps.extract_branch.outputs.branch }}
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-main
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
            type=gha,scope=ragtime-${{ steps.extract_branch.outputs.branch }}
            type=gha,scope=ragtime-main
            type=gha
          cache-to: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ steps.extract_branch.outputs.branch }},mode=max,oci-mediatypes=true,image-manifest=true,compression=zstd
            type=gha,mode=max,scope=ragtime-${{ steps.extract_branch.outputs.branch }}

      - name: Cleanup old Docker images
        if: github.event_name != 'pull_request'
        uses: ./.github/actions/cleanup
        with:
          repositories: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Match all tags, but exclude stable branch, legacy, and buildcache tags from deletion
          tagPattern: '.'
          excludePattern: ':(latest|main|beta|latest-beta|legacy|legacy-beta)$|:buildcache($|-.*$)'
          keep: '3'

  build-runtime:
    name: Build Runtime Image
    runs-on: self-hosted
    needs: [test]
    if: >-
      needs.test.outputs.build_images == 'true' &&
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository
      ) ||
      (
        (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/beta') &&
        !(github.event_name == 'workflow_dispatch' && github.event.inputs.build_legacy_image == 'true')
      )
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build-runtime.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract branch name
        id: extract_branch
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            SAFE_BRANCH="pr-${{ github.event.pull_request.number }}"
          else
            REF_NAME="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
            SAFE_BRANCH=$(echo "$REF_NAME" | sed 's/[\/:@]/-/g')
          fi
          echo "branch=$SAFE_BRANCH" >> $GITHUB_OUTPUT

      - name: Determine Runtime Docker tags
        id: meta
        run: |
          BRANCH="${{ steps.extract_branch.outputs.branch }}"
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_RUNTIME_NAME }}"

          TAGS="${IMAGE}:${BRANCH}"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TAGS="${TAGS},${IMAGE}:${BRANCH}-${SHORT_SHA}"
          else
            TAGS="${TAGS},${IMAGE}:${SHORT_SHA}"
          fi

          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            TAGS="${TAGS},${IMAGE}:latest"
          fi

          if [ "${GITHUB_REF}" = "refs/heads/beta" ]; then
            TAGS="${TAGS},${IMAGE}:latest-beta"
          fi

          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          echo "image-name=${IMAGE}:${BRANCH}" >> $GITHUB_OUTPUT

      - name: Log in to Harbor Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push runtime Docker image
        id: build-runtime
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_RUNTIME_NAME }}:buildcache-${{ steps.extract_branch.outputs.branch }}
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_RUNTIME_NAME }}:buildcache-main
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_RUNTIME_NAME }}:buildcache
            type=gha,scope=runtime-${{ steps.extract_branch.outputs.branch }}
            type=gha,scope=runtime-main
            type=gha
          cache-to: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_RUNTIME_NAME }}:buildcache-${{ steps.extract_branch.outputs.branch }},mode=max,oci-mediatypes=true,image-manifest=true,compression=zstd
            type=gha,mode=max,scope=runtime-${{ steps.extract_branch.outputs.branch }}

      - name: Cleanup old runtime Docker images
        if: github.event_name != 'pull_request'
        uses: ./.github/actions/cleanup
        with:
          repositories: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_RUNTIME_NAME }}
          tagPattern: '.'
          excludePattern: ':(latest|main|beta|latest-beta)$|:buildcache($|-.*$)'
          keep: '3'

  # Build legacy image for older CPUs without X86_V2 support
  build-legacy:
    name: Build Legacy Image
    runs-on: self-hosted
    needs: [test]
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' &&
      github.event.inputs.build_legacy_image == 'true' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/beta'))
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build-legacy.outputs.digest }}
      image-name: ${{ steps.meta.outputs.image-name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine legacy Docker tags
        id: meta
        run: |
          REF_NAME="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          SAFE_BRANCH=$(echo "$REF_NAME" | sed 's/[\/:@]/-/g')
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

          ENVIRONMENT="main"
          if [ "${GITHUB_REF}" = "refs/heads/beta" ]; then
            ENVIRONMENT="beta"
          fi

          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            LEGACY_TAG="legacy"
          else
            LEGACY_TAG="legacy-${SAFE_BRANCH}"
          fi

          TAGS="${IMAGE}:${LEGACY_TAG}"

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "image-name=${IMAGE}:${LEGACY_TAG}" >> "$GITHUB_OUTPUT"
          echo "short-sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "environment=${ENVIRONMENT}" >> "$GITHUB_OUTPUT"
          echo "Legacy tags to be pushed: ${TAGS}"

      - name: Log in to Harbor Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push legacy Docker image
        id: build-legacy
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            LEGACY_CPU=1
            APP_VERSION=${{ steps.meta.outputs.short-sha }}
            ENVIRONMENT=${{ steps.meta.outputs.environment }}
          # Don't use cache for legacy build to ensure clean numpy compilation
          no-cache: true

  sign:
    name: Sign Container Images
    runs-on: self-hosted
    needs: [build-main, build-runtime]
    if: >-
      always() &&
      github.event_name != 'pull_request' &&
      needs.build-main.result == 'success' &&
      needs.build-runtime.result == 'success'
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Log in to Harbor Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Sign the main container image with Cosign
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
        run: |
          # Construct the full image reference from build outputs
          IMAGE_DIGEST="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-main.outputs.digest }}"

          echo "Signing image: ${IMAGE_DIGEST}"

          # Sign using the full digest reference (registry/repo@sha256:...)
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY "${IMAGE_DIGEST}"

      - name: Sign the runtime image with Cosign
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
        run: |
          IMAGE_DIGEST="${{ env.REGISTRY }}/${{ env.IMAGE_RUNTIME_NAME }}@${{ needs.build-runtime.outputs.digest }}"
          echo "Signing runtime image: ${IMAGE_DIGEST}"
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY "${IMAGE_DIGEST}"

  sign-legacy:
    name: Sign Legacy Container Image
    runs-on: self-hosted
    needs: [build-legacy]
    if: always() && needs.build-legacy.result == 'success'
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Log in to Harbor Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Sign the legacy container image with Cosign
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
        run: |
          IMAGE_DIGEST="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-legacy.outputs.digest }}"
          echo "Signing legacy image: ${IMAGE_DIGEST}"
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY "${IMAGE_DIGEST}"

  sbom:
    name: Generate SBOM
    runs-on: self-hosted
    needs: [build-main, build-runtime]
    if: >-
      always() &&
      github.event_name != 'pull_request' &&
      needs.build-main.result == 'success' &&
      needs.build-runtime.result == 'success'
    permissions:
      contents: read

    steps:
      - name: Log in to Harbor Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ needs.build-main.outputs.image-name }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ needs.build-main.outputs.branch }}
          path: sbom.spdx.json
          retention-days: 90

  summary:
    name: Build Summary
    runs-on: self-hosted
    needs: [build-main, build-runtime, build-legacy, sign, sign-legacy, sbom]
    if: always()
    permissions:
      contents: read

    steps:
      - name: Generate Summary
        run: |
          # Check job statuses
          BUILD_PUSH_STATUS="${{ needs.build-main.result }}"
          SIGN_STATUS="${{ needs.sign.result }}"
          LEGACY_BUILD_STATUS="${{ needs.build-legacy.result }}"
          LEGACY_SIGN_STATUS="${{ needs.sign-legacy.result }}"
          SBOM_STATUS="${{ needs.sbom.result }}"
          RUNTIME_STATUS="${{ needs.build-runtime.result }}"

          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ needs.build-main.outputs.branch }}" >> $GITHUB_STEP_SUMMARY
          echo "**Short SHA:** ${{ needs.build-main.outputs.short-sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$BUILD_PUSH_STATUS" = "success" ]; then
            echo "### Pull Command" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
            echo "docker pull ${{ needs.build-main.outputs.image-name }}" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "$RUNTIME_STATUS" = "success" ]; then
            echo "### Runtime Pull Command" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
            echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_RUNTIME_NAME }}:${{ needs.build-main.outputs.branch }}" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          echo "**Digest:** \`${{ needs.build-main.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$SIGN_STATUS" = "success" ]; then
            echo "**Signed:** Yes (Cosign)" >> $GITHUB_STEP_SUMMARY
          elif [ "$SIGN_STATUS" = "skipped" ]; then
            echo "**Signed:** Skipped" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Signed:** Failed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$SBOM_STATUS" = "success" ]; then
            echo "**SBOM:** Generated" >> $GITHUB_STEP_SUMMARY
          elif [ "$SBOM_STATUS" = "skipped" ]; then
            echo "**SBOM:** Skipped" >> $GITHUB_STEP_SUMMARY
          else
            echo "**SBOM:** Failed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$LEGACY_BUILD_STATUS" = "success" ] && [ "$LEGACY_SIGN_STATUS" = "success" ]; then
            echo "**Legacy Image:** Built and signed (${{ needs.build-legacy.outputs.image-name }})" >> $GITHUB_STEP_SUMMARY
          elif [ "$LEGACY_BUILD_STATUS" = "skipped" ]; then
            echo "**Legacy Image:** Skipped" >> $GITHUB_STEP_SUMMARY
          elif [ "$LEGACY_BUILD_STATUS" = "success" ]; then
            echo "**Legacy Image:** Built, signing $LEGACY_SIGN_STATUS" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Legacy Image:** $LEGACY_BUILD_STATUS" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$RUNTIME_STATUS" = "success" ]; then
            echo "**Runtime Image:** Built" >> $GITHUB_STEP_SUMMARY
          elif [ "$RUNTIME_STATUS" = "skipped" ]; then
            echo "**Runtime Image:** Skipped" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Runtime Image:** Failed" >> $GITHUB_STEP_SUMMARY
          fi
